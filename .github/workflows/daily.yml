name: Hotlist daily

on:
  schedule:
    # GitHub Actions scheduled crons are best-effort and frequently delayed
    # 30+ minutes during peak load. Three trigger times for redundancy;
    # concurrency control + email idempotency prevent duplicate work.
    - cron: "0 21 * * *"   # 21:00 UTC primary (after US close)
    - cron: "30 21 * * *"  # 21:30 UTC backup 1
    - cron: "0 22 * * *"   # 22:00 UTC backup 2
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

# Only one run at a time. Queued runs wait. Prevents the race condition
# where two workflows committing the same files within seconds of each
# other reject one of the pushes.
concurrency:
  group: hotlist-daily
  cancel-in-progress: false

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m playwright install --with-deps chromium

      - name: Scrape Hotlist
        run: python scripts/scrape.py --top 30
        env:
          PYTHONUNBUFFERED: "1"

      - name: Compute state
        run: python scripts/compute.py

      - name: Compute performance vs VUAG.L
        run: python scripts/perf.py
        continue-on-error: true

      - name: Render dashboard
        run: python scripts/render.py

      - name: Send daily digest email
        run: python scripts/email_digest.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_URL: https://soylee22.github.io/hotlist-tracker/
        continue-on-error: true

      - name: Commit data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/index.html
          if git diff --staged --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git commit -m "daily: hotlist update $(date -u +%Y-%m-%d)"
          # Retry push with rebase on conflict (handles edge case of
          # manual push during workflow run despite concurrency lock).
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing on origin/main..."
            git pull --rebase origin main || git rebase --abort
            sleep 3
          done
          git push  # final attempt, fail loudly if still conflicting

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy-pages:
    needs: scrape-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
