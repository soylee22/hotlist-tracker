name: Hotlist daily

on:
  schedule:
    # 21:00 UTC = 22:00 BST / 21:00 GMT. After US close.
    - cron: "0 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          python -m playwright install --with-deps chromium

      - name: Scrape Hotlist
        run: python scripts/scrape.py --top 30
        env:
          PYTHONUNBUFFERED: "1"

      - name: Compute state
        run: python scripts/compute.py

      - name: Compute performance vs VUAG.L
        run: python scripts/perf.py
        continue-on-error: true

      - name: Render dashboard
        run: python scripts/render.py

      - name: Send daily digest email
        run: python scripts/email_digest.py
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_URL: https://soylee22.github.io/hotlist-tracker/
        continue-on-error: true

      - name: Commit data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ dashboard/index.html
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "daily: hotlist update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy-pages:
    needs: scrape-and-publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
